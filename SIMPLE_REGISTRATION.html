
<!DOCTYPE html>
<html>
<head>
    <title>SmartPOS - Register New Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background: #45a049;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #dff0d8;
            color: #3c763d;
        }
        .error {
            background: #f2dede;
            color: #a94442;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 Register New Store</h1>
        
        <div class="form-group">
            <label>Store Name</label>
            <input type="text" id="storeName" placeholder="e.g., Masing Bakery" value="Masing Bakery">
        </div>
        
        <div class="form-group">
            <label>Subdomain (no spaces)</label>
            <input type="text" id="subdomain" placeholder="e.g., masingbakery" value="masingbakery">
        </div>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="e.g., admin" value="admin">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="e.g., password123" value="password123">
        </div>
        
        <div class="form-group">
            <label>Email (optional)</label>
            <input type="email" id="email" placeholder="e.g., admin@store.com">
        </div>
        
        <div class="form-group">
            <label>Mobile (optional)</label>
            <input type="text" id="mobile" placeholder="e.g., 1234567890">
        </div>
        
        <div class="form-group">
            <label>Owner Name (optional)</label>
            <input type="text" id="ownerName" placeholder="e.g., John Doe">
        </div>
        
        <button id="registerBtn">Register Store</button>
        
        <div id="message" class="message" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const storeName = document.getElementById('storeName').value;
            const subdomain = document.getElementById('subdomain').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const ownerName = document.getElementById('ownerName').value;
            
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('registerBtn');
            
            btn.disabled = true;
            btn.innerHTML = 'Registering...';
            messageDiv.style.display = 'none';
            
            try {
                const response = await fetch(window.location.origin + '/api/tenants/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-ID': subdomain
                    },
                    body: JSON.stringify({
                        storeName,
                        subdomain,
                        username,
                        password,
                        email,
                        mobile,
                        ownerName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = `
                        ✅ Store registered successfully!<br>
                        You can now login at: 
                        <a href="/store/${subdomain}">/store/${subdomain}</a>
                    `;
                    messageDiv.style.display = 'block';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Error: ' + (data.error || 'Registration failed');
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Error: ' + error.message;
                messageDiv.style.display = 'block';
            }
            
            btn.disabled = false;
            btn.innerHTML = 'Register Store';
        });
    </script>
</body>
</html>
